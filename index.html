<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velmed Hospitals | Patient Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container" id="mainContainer">
        <div class="form-card" id="formSection">
            <header class="form-header">
                <h2 style="color: #00668c; margin-bottom: 5px;">Register Grievance</h2>
                <p style="color: #666; font-size: 14px;">Your feedback helps us improve Velmed standards.</p>
            </header>

            <div class="form-body">
                <div class="input-group">
                    <label>Patient Name</label>
                    <input type="text" id="patientName" placeholder="Full Name">
                </div>

                <div class="input-group">
                    <label>UHID Number</label>
                    <input type="text" id="uhid" placeholder="e.g. 123456">
                </div>

                <div class="input-group">
                    <label>Department</label>
                    <select id="department">
                        <option value="Billing">Billing / Cashier</option>
                        <option value="Nursing">Nursing / Ward</option>
                        <option value="Housekeeping">Housekeeping / IPD</option>
                        <option value="Front Desk">Front Desk / OPD</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Facility Rating</label>
                    <select id="rating" style="color: #f39c12; font-weight: bold;">
                        <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (Good)</option>
                        <option value="3">⭐⭐⭐ (Average)</option>
                        <option value="2">⭐⭐ (Poor)</option>
                        <option value="1">⭐ (Very Poor)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Contact Details (Phone or Email)</label>
                    <input type="text" id="contactInfo" placeholder="How should we reach you?">
                </div>

                <div class="input-group">
                    <label>Detailed Description</label>
                    <textarea id="description" rows="4" placeholder="Please describe your concern..."></textarea>
                </div>

                <button class="submit-btn" id="submitBtn" onclick="submitGrievance()">Submit Grievance</button>
            </div>
        </div>

        <div class="thank-you-card" id="thankYouSection" style="display: none;">
            <div class="success-icon">✔</div>
            <h2>Thank You!</h2>
            <p>Your grievance has been successfully registered with Velmed Management.</p>
            <p style="font-size: 14px; color: #888;">Our Bed Management team will review this shortly.</p>
            <button class="secondary-btn" onclick="location.reload()">New Submission</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
