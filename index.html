<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velmed Hospital | Patient Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <header class="main-header">
            <div class="logo-section">
                <h2 style="color: #00668c; margin:0; letter-spacing: 1px;">VELMED HOSPITALS</h2>
                <p style="margin:0; font-size: 11px; color: #666; font-weight: bold;">MANAGEMENT INTAKE PORTAL</p>
            </div>
            <div class="status-indicator">● Secure Link</div>
        </header>

        <main class="content-wrapper">
            <div class="form-card" id="form-container">
                <h3>Register Grievance</h3>
                <p class="sub-text">Your feedback is sent directly to the Bed Management Office.</p>
                
                <div class="input-grid">
                    <div class="input-group">
                        <label>Patient Name</label>
                        <input type="text" id="patientName" placeholder="Enter Full Name">
                    </div>
                    <div class="input-group">
                        <label>UHID</label>
                        <input type="text" id="uhid" placeholder="UHID-12345">
                    </div>
                </div>

                <div class="input-grid">
                    <div class="input-group">
                        <label>Department</label>
                        <select id="department">
                            <option value="Billing">Billing / Cashier</option>
                            <option value="Nursing">Nursing / Ward</option>
                            <option value="Housekeeping">Housekeeping</option>
                            <option value="Front Desk">Front Desk / OPD</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="Service Delay">Delay in Service</option>
                            <option value="Behavior">Staff Behavior</option>
                            <option value="Facility">Facility / Cleanliness</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Facility Rating</label>
                    <select id="rating">
                        <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (Good)</option>
                        <option value="3">⭐⭐⭐ (Average)</option>
                        <option value="2">⭐⭐ (Poor)</option>
                        <option value="1">⭐ (Very Poor)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Please describe the issue..." rows="3"></textarea>
                </div>

                <div class="input-group">
                    <label>Phone Number or Email ID</label>
                    <input type="text" id="contactInfo" placeholder="Where should we contact you?">
                </div>

                <button id="submitBtn" onclick="submitGrievance()">Submit Grievance</button>
            </div>

            <div id="success-message" style="display: none; text-align: center; padding: 40px 20px;">
                <div style="font-size: 50px; margin-bottom: 20px;">✅</div>
                <h2 style="color: #00668c;">Thank You!</h2>
                <p style="color: #666; line-height: 1.6;">Your grievance has been successfully submitted to Velmed Management. We value your feedback and will review it shortly.</p>
                <button onclick="location.reload()" style="background: #eee; color: #333; margin-top: 20px; width: auto; padding: 10px 30px;">File another report</button>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
