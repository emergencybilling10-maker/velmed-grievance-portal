<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops Command Center | Velmed</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1300px; margin: 20px auto; background: #f4f7f6; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00668c; padding-bottom: 15px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #00668c; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        /* Status Badges */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-Pending { background: #fff3cd; color: #856404; }
        .status-UnderReview { background: #cfe2ff; color: #084298; }
        .status-Resolved { background: #d4edda; color: #0f5132; }

        /* SLA Timer Styles */
        .sla-tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-top: 5px; display: inline-block; }
        .sla-urgent { background: #ff4d4d; color: white; animation: blink 1.5s infinite; }
        .sla-normal { background: #27ae60; color: white; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* Buttons */
        .open-btn { background: #00668c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .open-btn:hover { background: #004d6a; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="dashboard-header">
            <div>
                <h2 style="margin:0; color:#00668c;">Velmed Ops Monitor</h2>
                <p style="margin:0; font-size:14px;">Real-time Management Command Center</p>
            </div>
            <div id="live-indicator" style="color:#27ae60; font-weight:bold;">● LIVE CONNECTION</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Time / SLA</th>
                    <th>Patient Details</th>
                    <th>Dept / Rating</th>
                    <th>Current Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="grievanceTable">
                </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDikrV0xVMX6ZGA4_qZWlN_Dr_nR_PnWWk",
            authDomain: "velmed-hospital-feedback.firebaseapp.com",
            projectId: "velmed-hospital-feedback",
            storageBucket: "velmed-hospital-feedback.firebasestorage.app",
            messagingSenderId: "271213008018",
            appId: "1:271213008018:web:f3e5136d18b8a64a02c24b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Real-time listener for the dashboard
        db.collection("grievances").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const tableBody = document.getElementById('grievanceTable');
            tableBody.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                
                // Format Time
                const timeData = data.timestamp ? data.timestamp.toDate() : new Date();
                const timeString = timeData.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                // SLA Calculation (Overdue if > 2 hours and not resolved)
                const hoursOld = (new Date() - timeData) / (1000 * 60 * 60);
                const isOverdue = hoursOld > 2 && data.status !== "Resolved";
                const slaClass = isOverdue ? 'sla-urgent' : 'sla-normal';
                const slaText = isOverdue ? 'OVERDUE' : 'ACTIVE';

                // Status Styling
                const statusClean = data.status ? data.status.replace(/\s/g, '') : 'Pending';

                tableBody.innerHTML += `
                    <tr>
                        <td>
                            <strong>${timeString}</strong><br>
                            <span class="sla-tag ${slaClass}">${slaText}</span>
                        </td>
                        <td>
                            <strong>${data.patientName}</strong><br>
                            <small>UHID: ${data.uhid}</small>
                        </td>
                        <td>
                            ${data.department}<br>
                            <span style="color:#f39c12;">${data.rating} ⭐</span>
                        </td>
                        <td>
                            <span class="badge status-${statusClean}">${data.status || 'Pending'}</span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 8px;">
                                <a href="action.html?id=${id}" class="open-btn">📂 Open Case</a>
                                <button class="delete-btn" onclick="deleteEntry('${id}')">🗑</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        // Delete Function
        function deleteEntry(id) {
            if (confirm("Are you sure you want to permanently delete this record?")) {
                db.collection("grievances").doc(id).delete()
                  .then(() => console.log("Deleted"))
                  .catch((error) => alert("Error deleting: " + error));
            }
        }
    </script>
</body>
</html>
