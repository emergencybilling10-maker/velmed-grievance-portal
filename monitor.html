<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops Command Center | Velmed</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1300px; margin: 20px auto; background: #f4f7f6; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00668c; padding-bottom: 15px; margin-bottom: 20px; }
        
        /* Filter Buttons */
        .filter-bar { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; background: #ddd; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { background: #00668c; color: white; }

        /* Table & SLA Styles */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #00668c; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .sla-tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .sla-urgent { background: #ff4d4d; color: white; animation: blink 1.5s infinite; }
        .sla-normal { background: #27ae60; color: white; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="dashboard-header">
            <div>
                <h2 style="margin:0; color:#00668c;">Ops Command Center</h2>
                <p style="margin:0; font-size:14px;">Real-time Management Monitor</p>
            </div>
            <div id="live-indicator" style="color:#27ae60; font-weight:bold;">● LIVE CONNECTION</div>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" onclick="filterDept('All')">All Departments</button>
            <button class="filter-btn" onclick="filterDept('Billing')">Billing</button>
            <button class="filter-btn" onclick="filterDept('Nursing')">Nursing</button>
            <button class="filter-btn" onclick="filterDept('Housekeeping')">Housekeeping</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Time / SLA</th>
                    <th>Patient Details</th>
                    <th>Dept/Cat</th>
                    <th>Rating</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="grievanceTable"></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDikrV0xVMX6ZGA4_qZWlN_Dr_nR_PnWWk",
            authDomain: "velmed-hospital-feedback.firebaseapp.com",
            projectId: "velmed-hospital-feedback",
            storageBucket: "velmed-hospital-feedback.firebasestorage.app",
            messagingSenderId: "271213008018",
            appId: "1:271213008018:web:f3e5136d18b8a64a02c24b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentFilter = 'All';

        // REAL-TIME LISTENER (Snapshots)
        db.collection("grievances").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            renderTable(snapshot);
        });

        function renderTable(snapshot) {
            const tableBody = document.getElementById('grievanceTable');
            tableBody.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                if (currentFilter !== 'All' && data.department !== currentFilter) return;

                const docId = doc.id;
                const timeData = data.timestamp ? data.timestamp.toDate() : new Date();
                const timeString = timeData.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                // SLA Timer Logic (Check if older than 2 hours)
                const hoursOld = (new Date() - timeData) / (1000 * 60 * 60);
                const slaClass = hoursOld > 2 ? 'sla-urgent' : 'sla-normal';
                const slaText = hoursOld > 2 ? 'OVERDUE' : 'ACTIVE';

                tableBody.innerHTML += `
                    <tr>
                        <td>
                            <strong>${timeString}</strong><br>
                            <span class="sla-tag ${slaClass}">${slaText}</span>
                        </td>
                        <td><strong>${data.patientName}</strong><br><small>UHID: ${data.uhid}</small></td>
                        <td>${data.department}<br><small>${data.category}</small></td>
                        <td style="color:#f39c12;">${data.rating} ⭐</td>
                        <td>${data.description}</td>
                        <td>
                            <button class="delete-btn" onclick="deleteEntry('${docId}')">🗑</button>
                        </td>
                    </tr>
                `;
            });
        }

        function filterDept(dept) {
            currentFilter = dept;
            // Visual update for buttons
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            // Trigger refresh
            db.collection("grievances").orderBy("timestamp", "desc").get().then(renderTable);
        }

        function deleteEntry(id) {
            if (confirm("Permanently delete this record?")) {
                db.collection("grievances").doc(id).delete();
            }
        }
    </script>
</body>
</html>
